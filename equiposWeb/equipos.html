<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCHORA - Generar Equipos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">MATCHORA</div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="jugadores.html">Jugadores</a></li>
            <li><a href="deportes.html">Deportes</a></li>
            <li><a href="equipos.html" class="activo">Generar Equipos</a></li>
        </ul>

        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>

    </nav>

    <main class="contenido">
        <h2 class="modulo-titulo">Generar Equipos Equilibrados</h2>

        <div class="equipos-layout">
            <div class="panel-jugadores">
                <h3>Jugadores disponibles</h3>
                <ul id="listaJugadoresEquipos" class="lista-jugadores-web">
                    <li>Cargando...</li>
                </ul>
                <p id="totalJugadores" class="hint"></p>
            </div>

            <div class="panel-resultado">
                <div class="config-equipos">

                    <label>Deporte:</label>
                    <select id="selDeporte">
                        <option value="">Cargando...</option>
                    </select>

                    <label>Número de equipos:</label>
                    <input type="number" id="numEquipos" value="2" min="2" max="10">

                    <div id="nombresEquipos"></div>

                    <div class="config-botones">
                        <button class="btn-ver-campo" onclick="abrirCampo()">🏟️ Ver Campo</button>
                        <button class="btn-generar" onclick="generarEquipos()">⚡ GENERAR EQUIPOS</button>
                    </div>

                </div>

                <div id="resultadoEquipos" class="resultado-equipos">
                    <p class="hint">Configure los equipos y presione Generar</p>
                </div>
                <p id="mensajeEquipos" class="mensaje-estado"></p>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/equipos.js"></script>
    <script>iniciarModuloEquipos();</script>
</body>
</html>
